<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Debugger</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <div class="header-title">
          <h1>Layout Debugger</h1>
          <button id="closeSidebarBtn" class="close-btn" title="Close sidebar">✕</button>
        </div>
      </div>
    </header>

    <div class="controls">
      <button id="toggleBordersBtn" class="btn btn-primary">
        <span class="btn-text">Toggle Borders</span>
      </button>
      <div class="line-style-control">
        <span class="line-style-label">Line style:</span>
        <label class="line-style-option"><input type="radio" name="lineStyle" value="solid" checked> Solid</label>
        <label class="line-style-option"><input type="radio" name="lineStyle" value="dotted"> Dotted</label>
      </div>
      <div class="range-control">
        <div class="range-control-header">
          <span class="line-style-label">Border opacity</span>
          <span id="borderOpacityValue" class="range-value">100%</span>
        </div>
        <input id="borderOpacityRange" class="range-input" type="range" min="5" max="100" step="5" value="100">
      </div>
      <div class="toggle-group">
        <span class="line-style-label">Overlay labels:</span>
        <label class="line-style-option"><input type="checkbox" name="labelElement" checked> Element</label>
        <label class="line-style-option"><input type="checkbox" name="labelPadding" checked> Padding</label>
        <label class="line-style-option"><input type="checkbox" name="labelMargin"> Margin</label>
      </div>
      <div class="toggle-group">
        <span class="line-style-label">Inspect:</span>
        <label class="line-style-option"><input type="checkbox" name="hoverInspect"> Hover preview</label>
        <label class="line-style-option"><input type="checkbox" name="monochromeMode"> Monochrome</label>
      </div>
    </div>

    <div class="info">
      <p class="info-text">
        Click any element on the page to inspect it below
      </p>
      <div id="pageStatus" class="page-status"></div>
    </div>

    <div id="inspector" class="inspector">
      <div class="inspector-header">
        <h3>CSS Inspector</h3>
      </div>
      <div id="inspectorContent" class="inspector-content">
        <p class="inspector-empty">Click an element to inspect</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
