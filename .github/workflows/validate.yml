name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate manifest
        run: |
          python -m json.tool manifest.json > /dev/null
          python - <<'PY'
          import json

          with open("manifest.json", encoding="utf-8") as file:
              manifest = json.load(file)

          assert manifest.get("manifest_version") == 3, "Manifest V3 is required"
          assert manifest.get("name"), "Extension name is required"
          assert manifest.get("version"), "Extension version is required"
          PY

      - name: Check JavaScript syntax
        run: |
          node --check background.js
          node --check content.js
          node --check popup.js

      - name: Check required project files
        run: |
          test -f LICENSE
          test -f README.md
          test -f CONTRIBUTING.md
          test -f CODE_OF_CONDUCT.md
          test -f SECURITY.md
          test -f PRIVACY.md
          test -f icons/icon16.png
          test -f icons/icon48.png
          test -f icons/icon128.png
