name: Bug report
description: Report reproducible incorrect behavior
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Search existing issues first and avoid including private page content.
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 150.0.0
    validations:
      required: true
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a normal web page
        2. Open Layout Debugger
        3. Enable borders
        4. Click an element
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, recording, or console output
      description: Remove private or sensitive page information before attaching evidence.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I reproduced this on a normal web page, not a restricted browser page.
          required: true
        - label: I removed private information from screenshots and logs.
          required: true
